<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản Đồ Cảnh Báo Sét & Lưới Điện - Design by Quyết Thắng</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { width: 100%; height: 100vh; }
        .info-panel {
            position: absolute; top: 15px; right: 50px;
            background: rgba(255, 255, 255, 0.95); padding: 15px;
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000; width: 260px;
        }
        .info-panel h3 { margin-top: 0; margin-bottom: 4px; color: #333; border-bottom: 2px solid #eee; padding-bottom: 8px; }
        .author-credit { font-size: 12px; color: #666; font-style: italic; margin-top: 5px; margin-bottom: 10px; text-align: right; }
        .status { font-weight: bold; }
        .popup-custom { max-height: 200px; overflow-y: auto; font-size: 13px; }
        .popup-custom b { color: #0056b3; }
        .filter-section { margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 10px; }
        select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #aaa; font-weight: bold; cursor: pointer; }
        
        .lightning-icon-div { cursor: pointer; filter: drop-shadow(0 0 2px rgba(0,0,0,0.8)); transition: transform 0.2s; }
        .lightning-icon-div:hover { transform: scale(1.4); }
        
        /* Style cho nút bấm Excel */
        .btn-excel {
            background-color: #28a745; color: white; border: none; padding: 6px 12px;
            border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px;
            margin-top: 5px; transition: 0.2s;
        }
        .btn-excel:hover { background-color: #218838; }

        /* Style nhãn tên Quần đảo chủ quyền */
        .island-label {
            font-weight: bold;
            color: #bd0000;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #bd0000;
            border-radius: 4px;
            font-size: 12px;
            padding: 4px 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h3>Cảnh Báo Giông Sét</h3>
        <div class="author-credit">Design by Quyết Thắng</div>
        
        <p style="margin-top: 0;">Trạng thái: <span id="loading-status" class="status" style="color: orange;">Đang tải...</span></p>
        <p>Số điểm sét: <span id="lightning-count" style="font-weight: bold; color: #d9534f; font-size: 18px;">0</span></p>
        
        <div class="filter-section">
            <label for="time-filter"><b>Lọc theo thời gian:</b></label>
            <select id="time-filter" onchange="filterLightning()">
                <option value="1800">30 Phút qua</option>
                <option value="7200">2 Giờ qua</option>
                <option value="21600">6 Giờ qua</option>
                <option value="43200">12 Giờ qua</option>
                <option value="86400">24 Giờ qua</option>
                <option value="172800">2 Ngày qua</option>
                <option value="604800" selected>1 Tuần qua (Tất cả)</option>
            </select>
        </div>
        <div style="margin-top: 10px; font-size: 12px; color: #666;">
            <i>* Sử dụng thanh công cụ bên trái để khoanh vùng kiểm tra Lưới điện.</i>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    
    <script>
        const map = L.map('map').setView([22.3500, 104.0500], 9);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const lightningLayer = L.layerGroup().addTo(map);
        const luoiDienLayer = L.layerGroup().addTo(map);

        const overlayMaps = {
            "⚡ Cảnh báo Sét đánh": lightningLayer,
            "🔌 Hạ tầng Lưới điện": luoiDienLayer
        };
        L.control.layers(null, overlayMaps, {collapsed: false, position: 'bottomleft'}).addTo(map);

        // ==================================================
        // THÊM CHỦ QUYỀN VÀ THỦ ĐÔ 
        // ==================================================
        
        const redStarIcon = L.divIcon({
            html: '<svg width="28" height="28" viewBox="0 0 24 24"><path fill="#ff1a1a" stroke="#ffffff" stroke-width="1.2" d="M12,17.27L18.18,21L16.54,13.97L22,9.24L14.81,8.62L12,2L9.19,8.62L2,9.24L7.45,13.97L5.82,21L12,17.27Z"></path></svg>',
            className: 'lightning-icon-div', iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -14]
        });

        const islandIcon = L.divIcon({
            html: '<svg width="14" height="14" viewBox="0 0 12 12"><circle cx="6" cy="6" r="4.5" fill="#ff1a1a" stroke="#ffffff" stroke-width="1.2"></circle></svg>',
            className: 'lightning-icon-div', iconSize: [14, 14], iconAnchor: [7, 7]
        });

        const hanoiMarker = L.marker([21.0285, 105.8542], { icon: redStarIcon }).addTo(map);
        hanoiMarker.bindPopup("<div style='text-align:center; font-weight:bold; font-size:13px;'>THỦ ĐÔ HÀ NỘI</div>");

        const hoangSaMarker = L.marker([16.5000, 112.0000], { icon: islandIcon }).addTo(map);
        hoangSaMarker.bindTooltip("QUẦN ĐẢO HOÀNG SA<br>(VIỆT NAM)", { permanent: true, direction: 'right', className: 'island-label', offset: [10, 0] });
        hoangSaMarker.bindPopup("<div style='text-align:center; font-weight:bold; font-size:13px;'>Quần đảo Hoàng Sa thuộc chủ quyền độc lập của Việt Nam</div>");

        const truongSaMarker = L.marker([9.5000, 112.5000], { icon: islandIcon }).addTo(map);
        truongSaMarker.bindTooltip("QUẦN ĐẢO TRƯỜNG SA<br>(VIỆT NAM)", { permanent: true, direction: 'right', className: 'island-label', offset: [10, 0] });
        truongSaMarker.bindPopup("<div style='text-align:center; font-weight:bold; font-size:13px;'>Quần đảo Trường Sa thuộc chủ quyền độc lập của Việt Nam</div>");

        // ==========================================
        // CẤU HÌNH CÔNG CỤ KHOANH VÙNG 
        // ==========================================
        let poleFeatures = [];
        let currentExportData = [];

        const drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        const drawControl = new L.Control.Draw({
            position: 'topleft',
            edit: { featureGroup: drawnItems },
            draw: {
                polyline: false, marker: false, circlemarker: false, circle: false,
                polygon: { allowIntersection: false, showArea: true },
                rectangle: true
            }
        });
        map.addControl(drawControl);

        let activePolygonGeoJSON = null; 
        let activePolygonLayer = null;

        map.on(L.Draw.Event.CREATED, function (e) {
            drawnItems.clearLayers(); 
            const layer = e.layer;
            drawnItems.addLayer(layer);
            activePolygonGeoJSON = layer.toGeoJSON();
            activePolygonLayer = layer;
            filterLightning(); 
        });

        map.on(L.Draw.Event.EDITED, function (e) {
            drawnItems.eachLayer(function(layer) {
                 activePolygonGeoJSON = layer.toGeoJSON();
                 activePolygonLayer = layer;
            });
            filterLightning();
        });

        map.on(L.Draw.Event.DELETED, function (e) {
            if (drawnItems.getLayers().length === 0) {
                activePolygonGeoJSON = null;
                activePolygonLayer = null;
            }
            filterLightning();
        });

        const lightningIconRed = L.divIcon({
            html: '<svg width="24" height="24" viewBox="0 0 24 24"><path fill="#ff1a1a" stroke="#ffffff" stroke-width="1" d="M12,2L2,14h8v8l12-12h-8L12,2z"></path></svg>',
            className: 'lightning-icon-div', iconSize: [24, 24], iconAnchor: [12, 12], popupAnchor: [0, -12]
        });

        function detectPoleName(properties) {
            if (!properties) return "Không rõ tên";
            const priorityKeys = ['Ten_Cot', 'TEN_COT', 'Ten_Cột', 'Ten', 'name', 'Name', 'MA_COT', 'Ma_Cot', 'Cot', 'Cột'];
            for (let key of priorityKeys) {
                if (properties[key]) return properties[key];
            }
            for (let key in properties) {
                if (typeof properties[key] === 'string' && properties[key].length > 0) return properties[key];
            }
            return "Cột chưa đặt tên";
        }

        async function loadLuoiDien() {
            try {
                const response = await fetch(`./luoidien.json?t=${new Date().getTime()}`);
                if (!response.ok) return; 
                const data = await response.json();
                
                poleFeatures = data.features.filter(f => f.geometry && (f.geometry.type === "Point" || f.geometry.type === "MultiPoint"));

                L.geoJSON(data, {
                    style: function (feature) {
                        if (feature.geometry.type === "LineString" || feature.geometry.type === "MultiLineString") {
                            return { color: "#0056b3", weight: 3, opacity: 0.8 }; 
                        } return {};
                    },
                    pointToLayer: function (feature, latlng) {
                        return L.circleMarker(latlng, { radius: 5, fillColor: "#ff8c00", color: "#ffffff", weight: 1, fillOpacity: 0.9 });
                    },
                    onEachFeature: function (feature, layer) {
                        if (feature.properties) {
                            let popupContent = "<div class='popup-custom'><b>Thông Tin Thiết Bị</b><hr style='margin:5px 0'>";
                            for (const key in feature.properties) {
                                if(feature.properties[key] !== null) popupContent += `<b>${key}:</b> ${feature.properties[key]}<br>`;
                            }
                            popupContent += "</div>";
                            layer.bindPopup(popupContent);
                        }
                    }
                }).addTo(luoiDienLayer);
            } catch (error) { console.error("Lỗi tải lưới điện:", error); }
        }

        let lightningDatabase = {}; 

        async function fetchLightningData() {
            const statusLabel = document.getElementById('loading-status');
            try {
                const response = await fetch(`./database_set.json?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error("Chưa có Database");
                
                lightningDatabase = await response.json();
                filterLightning();
                
                statusLabel.innerText = "Hoạt động tốt";
                statusLabel.style.color = "green";
            } catch (error) {
                console.log(error);
                statusLabel.innerText = "Chờ đồng bộ sét...";
                statusLabel.style.color = "gray";
            }
        }

        function exportExcel() {
            if (!currentExportData || currentExportData.length === 0) {
                alert("Không có dữ liệu điểm sét nào trong vùng để xuất báo cáo!");
                return;
            }

            let csvContent = "\uFEFFSTT,Khu Vực,Thời Gian Ghi Nhận,Vĩ Độ,Kinh Độ,Cột Gần Nhất,Khoảng Cách (Sét -> Cột)\n";

            currentExportData.forEach((row) => {
                let safeAddress = `"${row.address}"`;
                let safeTime = `"${row.time}"`;
                let safePole = `"${row.poleName}"`;
                let safeDist = `"${row.distSetToCot}"`;
                
                csvContent += `${row.stt},${safeAddress},${safeTime},${row.lat},${row.lng},${safePole},${safeDist}\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "Bao_Cao_Set_Luoi_Dien.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function filterLightning() {
            lightningLayer.clearLayers();
            
            const filterSeconds = parseInt(document.getElementById('time-filter').value);
            const currentSeconds = Date.now() / 1000;
            const threshold = currentSeconds - filterSeconds;

            let count = 0;
            let insidePolygonData = []; 

            for (const key in lightningDatabase) {
                const record = lightningDatabase[key];
                const infoArray = record.info; 
                const timestamp = record.timestamp;

                if (timestamp >= threshold) {
                    for(let i = 0; i < infoArray.length; i++) {
                        const strikeStr = infoArray[i];
                        if(!strikeStr) continue;
                        
                        const parts = strikeStr.split(',');
                        if(parts.length < 2) continue;
                        
                        const coordsStr = parts.pop().trim();
                        const address = parts.join(', ').trim();
                        const coordParts = coordsStr.split('-');
                        if(coordParts.length !== 2) continue;
                        
                        const lat = parseFloat(coordParts[0]);
                        const lng = parseFloat(coordParts[1]);

                        if (!isNaN(lat) && !isNaN(lng)) {
                            const pt = turf.point([lng, lat]);
                            let isInside = true;

                            if (activePolygonGeoJSON) {
                                if (!turf.booleanPointInPolygon(pt, activePolygonGeoJSON)) {
                                    isInside = false; 
                                }
                            }

                            if (!isInside) continue; 

                            const dateObj = new Date(timestamp * 1000);
                            const timeString = dateObj.toLocaleTimeString('vi-VN') + " - " + dateObj.toLocaleDateString('vi-VN');

                            let nearestPoleName = "N/A";
                            let distSetToCot = "N/A";

                            if (poleFeatures.length > 0) {
                                const poleCollection = turf.featureCollection(poleFeatures);
                                const nearestPoleFeature = turf.nearestPoint(pt, poleCollection);
                                
                                nearestPoleName = detectPoleName(nearestPoleFeature.properties);
                                const dS2C = turf.distance(pt, nearestPoleFeature, {units: 'meters'});
                                distSetToCot = `${dS2C.toFixed(1)} m`;
                            }

                            insidePolygonData.push({
                                stt: count + 1,
                                address: address,
                                lat: lat.toFixed(4),
                                lng: lng.toFixed(4),
                                time: timeString, // Dữ liệu thời gian đã sẵn sàng ở đây
                                poleName: nearestPoleName,
                                distSetToCot: distSetToCot
                            });

                            const popupHTML = `
                                <div style="font-family: Arial; font-size: 13px; width: 220px; line-height: 1.5;">
                                    <b style="color:red; font-size:14px;">⚡ ĐIỂM SÉT ĐÁNH</b><hr style="margin:5px 0;">
                                    <b>Khu vực:</b> ${address}<br>
                                    <b>Tọa độ:</b> ${lat.toFixed(4)}, ${lng.toFixed(4)}<br>
                                    <b>Thời gian:</b> <span style="color:blue; font-weight:bold;">${timeString}</span><br>
                                    <span style="color:#e65100;"><b>Cột gần nhất:</b> ${nearestPoleName} (${distSetToCot})</span>
                                </div>
                            `;

                            const marker = L.marker([lat, lng], { icon: lightningIconRed })
                                            .bindPopup(popupHTML)
                                            .bindTooltip(popupHTML, { direction: 'top', offset: [0, -15], opacity: 0.95 });
                            
                            lightningLayer.addLayer(marker);
                            count++;
                        }
                    }
                }
            }
            
            document.getElementById('lightning-count').innerText = count;
            currentExportData = insidePolygonData;

            if (activePolygonLayer) {
                let tableRowsHtml = "";
                insidePolygonData.forEach((item) => {
                    tableRowsHtml += `
                        <tr style="border-bottom: 1px solid #e0e0e0;">
                            <td style="padding: 6px; text-align: center;">${item.stt}</td>
                            <td style="padding: 6px; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${item.address}">${item.address}</td>
                            <td style="padding: 6px; text-align: center; color: #555; white-space: nowrap;">${item.time}</td>
                            <td style="padding: 6px; font-weight: bold; color: #0056b3; text-align: center;">${item.poleName}</td>
                            <td style="padding: 6px; color: #d32f2f; font-weight: bold; text-align: center;">${item.distSetToCot}</td>
                        </tr>
                    `;
                });

                if (insidePolygonData.length === 0) {
                    tableRowsHtml = `<tr><td colspan="5" style="text-align:center; padding:15px; color:#777;">Không tìm thấy điểm sét nào trong khu vực này.</td></tr>`;
                }

                // Mở rộng width của thẻ div bao ngoài lên 550px để bảng có thêm chỗ cho cột Thời gian
                const reportContent = `
                    <div style="font-family: Arial; font-size: 12px; width: 550px;">
                        <h4 style="margin: 0 0 6px 0; color: #d9534f; text-align: center; border-bottom: 2px solid #d9534f; padding-bottom: 4px;">BẢNG KHOANH VÙNG SÉT</h4>
                        
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <p style="margin: 0;">Tổng số điểm sét trong vùng: <b style="font-size:14px; color:red;">${insidePolygonData.length}</b></p>
                            <button class="btn-excel" onclick="exportExcel()">⬇ Xuất file Excel</button>
                        </div>

                        <div style="max-height: 190px; overflow-y: auto; border: 1px solid #ccc; border-radius: 4px;">
                            <table style="width: 100%; border-collapse: collapse; font-size: 11px;">
                                <thead style="background: #f5f5f5; position: sticky; top: 0; box-shadow: 0 1px 0 #ccc; z-index: 10;">
                                    <tr>
                                        <th style="padding: 6px; border-bottom: 1px solid #ccc;">STT</th>
                                        <th style="padding: 6px; border-bottom: 1px solid #ccc; text-align: left;">Vị trí sét</th>
                                        <th style="padding: 6px; border-bottom: 1px solid #ccc;">Thời gian</th>
                                        <th style="padding: 6px; border-bottom: 1px solid #ccc;">Cột gần nhất</th>
                                        <th style="padding: 6px; border-bottom: 1px solid #ccc;">Sét → Cột</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${tableRowsHtml}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                // Tăng maxWidth của Popup lên 580 để hiển thị tốt bảng rộng
                activePolygonLayer.bindPopup(reportContent, { maxWidth: 580 }).openPopup();
            }
        }

        loadLuoiDien();
        fetchLightningData();
        setInterval(fetchLightningData, 180000);
    </script>
</body>
</html>
