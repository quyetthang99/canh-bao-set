<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Cảnh Báo Giông Sét Toàn Toàn Quốc</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #map {
            width: 100%;
            height: 100vh;
        }
        .info-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            width: 260px;
        }
        .info-panel h3 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
        }
        .status {
            font-weight: bold;
        }
        button {
            width: 100%;
            padding: 8px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h3>Cảnh Báo Giông Sét</h3>
        <p>Trạng thái: <span id="loading-status" class="status" style="color: orange;">Đang tải...</span></p>
        <p>Số điểm sét ghi nhận: <span id="lightning-count" style="font-weight: bold; color: #d9534f;">0</span></p>
        <button onclick="fetchLightningData()">Cập nhật ngay</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Khởi tạo bản đồ, đặt tâm ở Việt Nam
        const map = L.map('map').setView([16.047079, 108.206230], 6);

        // 2. Thêm lớp bản đồ nền đường phố công cộng mượt mà
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Tạo một LayerGroup riêng để quản lý các vị trí sét đánh
        const lightningLayer = L.layerGroup().addTo(map);

        // 3. Khai báo đọc trực tiếp từ file dữ liệu nội bộ (Do GitHub Actions cào về liên tục)
        const API_URL = "./duongset.json"; 

        // 4. Hàm xử lý tải và vẽ dữ liệu thực tế lên bản đồ
        async function fetchLightningData() {
            const statusLabel = document.getElementById('loading-status');
            statusLabel.innerText = "Đang cập nhật...";
            statusLabel.style.color = "orange";
            
            try {
                // Thêm timestamp để ép trình duyệt luôn tải dữ liệu mới nhất, tránh bị lưu cache cũ
                const response = await fetch(`${API_URL}?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error("Không tìm thấy file duongset.json");
                
                const data = await response.json();
                
                // Làm sạch các marker cũ trước khi vẽ đợt dữ liệu mới
                lightningLayer.clearLayers();
                
                let count = 0;

                // 5. Vòng lặp bóc tách Object dữ liệu (Key: Mã sét, Value: Mảng thông tin)
                for (const key in data) {
                    if (data.hasOwnProperty(key)) {
                        const lightningInfo = data[key];
                        
                        // Trích xuất thông tin dựa trên cấu trúc thực tế của Hymetnet
                        const diaDanh = lightningInfo[0];       // Tên địa điểm (Xã, Tỉnh...)
                        const lat = parseFloat(lightningInfo[1]); // Vĩ độ (Latitude)
                        const lng = parseFloat(lightningInfo[2]); // Kinh độ (Longitude)

                        // Kiểm tra dữ liệu tọa độ hợp lệ trước khi đưa lên bản đồ
                        if (!isNaN(lat) && !isNaN(lng)) {
                            // Tạo Marker hình tròn biểu thị vị trí sét
                            const marker = L.circleMarker([lat, lng], {
                                radius: 5,
                                fillColor: "#ff1a1a", // Màu đỏ rực cho sét đánh
                                color: "#ffffff",     // Viền trắng bao quanh giúp nổi bật trên bản đồ
                                weight: 1,
                                opacity: 1,
                                fillOpacity: 0.85
                            }).bindPopup(`
                                <div style="font-family: Arial, sans-serif; font-size: 13px;">
                                    <b style="color: red; font-size: 14px;">⚡ CẢNH BÁO SÉT ĐÁNH</b><br>
                                    <hr style="margin: 5px 0; border: 0; border-top: 1px solid #eee;">
                                    <b>Vị trí:</b> ${diaDanh}<br>
                                    <b>Tọa độ:</b> ${lat.toFixed(4)}, ${lng.toFixed(4)}<br>
                                    <b>Mã hệ thống:</b> ${key}
                                </div>
                            `);

                            lightningLayer.addLayer(marker);
                            count++;
                        }
                    }
                }

                // Cập nhật bảng hiển thị thông tin khi thành công
                document.getElementById('lightning-count').innerText = count;
                statusLabel.innerText = "Hoạt động";
                statusLabel.style.color = "green";

            } catch (error) {
                console.error("Chi tiết lỗi:", error);
                statusLabel.innerText = "Chưa có file data";
                statusLabel.style.color = "red";
                
                // Nếu chưa có file dữ liệu thật, chạy tạm dữ liệu giả lập để kiểm tra giao diện bản đồ
                hienThiDuLieuGiaLap();
            }
        }

        // Hàm dự phòng hiển thị một vài điểm mẫu khi hệ thống chưa cào được file duongset.json
        function hienThiDuLieuGiaLap() {
            lightningLayer.clearLayers();
            const sampleData = [
                { lat: 21.0285, lng: 105.8048, place: "Khu vực Hà Nội (Dữ liệu mẫu)" },
                { lat: 22.4842, lng: 103.9691, place: "Khu vực Lào Cai (Dữ liệu mẫu)" },
                { lat: 10.8231, lng: 106.6297, place: "Khu vực TP.HCM (Dữ liệu mẫu)" }
            ];
            sampleData.forEach(item => {
                L.circleMarker([item.lat, item.lng], { radius: 6, fillColor: "yellow", color: "black", fillOpacity: 0.9 })
                 .bindPopup(`<b>Hệ thống đang chờ đồng bộ dữ liệu:</b><br>${item.place}`).addTo(lightningLayer);
            });
            document.getElementById('lightning-count').innerText = sampleData.length;
        }

        // Tự động khởi chạy ngay khi vừa mở trang web
        fetchLightningData();
        
        // Cấu hình chu kỳ tự động tải lại dữ liệu mới sau mỗi 3 phút (180000 ms)
        setInterval(fetchLightningData, 180000);
    </script>
</body>
</html>
