<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản Đồ Cảnh Báo Sét & Lưới Điện</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { width: 100%; height: 100vh; }
        .info-panel {
            position: absolute; top: 15px; right: 50px;
            background: rgba(255, 255, 255, 0.95); padding: 15px;
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000; width: 260px;
        }
        .info-panel h3 { margin-top: 0; color: #333; border-bottom: 2px solid #eee; padding-bottom: 8px; }
        .status { font-weight: bold; }
        .popup-custom { max-height: 200px; overflow-y: auto; font-size: 13px; }
        .popup-custom b { color: #0056b3; }
        .filter-section { margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 10px; }
        select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #aaa; font-weight: bold; cursor: pointer; }
        
        .lightning-icon-div { cursor: pointer; filter: drop-shadow(0 0 2px rgba(0,0,0,0.8)); transition: transform 0.2s; }
        .lightning-icon-div:hover { transform: scale(1.4); }
    </style>
</head>
<body>

    <div class="info-panel">
        <h3>Cảnh Báo Giông Sét</h3>
        <p>Trạng thái: <span id="loading-status" class="status" style="color: orange;">Đang tải...</span></p>
        <p>Số điểm sét: <span id="lightning-count" style="font-weight: bold; color: #d9534f; font-size: 18px;">0</span></p>
        
        <div class="filter-section">
            <label for="time-filter"><b>Lọc theo thời gian:</b></label>
            <select id="time-filter" onchange="filterLightning()">
                <option value="1800">30 Phút qua</option>
                <option value="7200">2 Giờ qua</option>
                <option value="21600">6 Giờ qua</option>
                <option value="43200">12 Giờ qua</option>
                <option value="86400">24 Giờ qua</option>
                <option value="172800">2 Ngày qua</option>
                <option value="604800" selected>1 Tuần qua (Tất cả)</option>
            </select>
        </div>
        <div style="margin-top: 10px; font-size: 12px; color: #666;">
            <i>* Sử dụng thanh công cụ bên trái để khoanh vùng kiểm tra Lưới điện.</i>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    
    <script>
        const map = L.map('map').setView([22.3500, 104.0500], 9);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const lightningLayer = L.layerGroup().addTo(map);
        const luoiDienLayer = L.layerGroup().addTo(map);

        const overlayMaps = {
            "⚡ Cảnh báo Sét đánh": lightningLayer,
            "🔌 Hạ tầng Lưới điện": luoiDienLayer
        };
        L.control.layers(null, overlayMaps, {collapsed: false, position: 'bottomleft'}).addTo(map);

        // Biến toàn cục lưu trữ các thành phần hạ tầng độc lập để tính toán khoảng cách
        let poleFeatures = [];
        let lineFeatures = [];

        // Hàm thông minh tự động quét tìm trường Tên Cột từ file PMIS
        function detectPoleName(properties) {
            if (!properties) return "Không rõ tên";
            const priorityKeys = ['Ten_Cot', 'TEN_COT', 'Ten_Cột', 'Ten', 'name', 'Name', 'MA_COT', 'Ma_Cot', 'Cot', 'Cột'];
            for (let key of priorityKeys) {
                if (properties[key]) return properties[key];
            }
            for (let key in properties) {
                if (typeof properties[key] === 'string' && properties[key].length > 0) return properties[key];
            }
            return "Cột chưa đặt tên";
        }

        // ==========================================
        // CẤU HÌNH CÔNG CỤ KHOANH VÙNG 
        // ==========================================
        const drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        const drawControl = new L.Control.Draw({
            position: 'topleft',
            edit: { featureGroup: drawnItems },
            draw: {
                polyline: false, marker: false, circlemarker: false, circle: false,
                polygon: { allowIntersection: false, showArea: true },
                rectangle: true
            }
        });
        map.addControl(drawControl);

        let activePolygonGeoJSON = null; 
        let activePolygonLayer = null;

        map.on(L.Draw.Event.CREATED, function (e) {
            drawnItems.clearLayers(); 
            const layer = e.layer;
            drawnItems.addLayer(layer);
            activePolygonGeoJSON = layer.toGeoJSON();
            activePolygonLayer = layer;
            filterLightning(); 
        });

        map.on(L.Draw.Event.EDITED, function (e) {
            drawnItems.eachLayer(function(layer) {
                 activePolygonGeoJSON = layer.toGeoJSON();
                 activePolygonLayer = layer;
            });
            filterLightning();
        });

        map.on(L.Draw.Event.DELETED, function (e) {
            if (drawnItems.getLayers().length === 0) {
                activePolygonGeoJSON = null;
                activePolygonLayer = null;
            }
            filterLightning();
        });

        // ICON SÉT ĐỎ
        const lightningIconRed = L.divIcon({
            html: '<svg width="24" height="24" viewBox="0 0 24 24"><path fill="#ff1a1a" stroke="#ffffff" stroke-width="1" d="M12,2L2,14h8v8l12-12h-8L12,2z"></path></svg>',
            className: 'lightning-icon-div', iconSize: [24, 24], iconAnchor: [12, 12], popupAnchor: [0, -12]
        });

        // TẢI LƯỚI ĐIỆN VÀ PHÂN TÁCH ĐỐI TƯỢNG HÌNH HỌC
        async function loadLuoiDien() {
            try {
                const response = await fetch(`./luoidien.json?t=${new Date().getTime()}`);
                if (!response.ok) return; 
                const data = await response.json();
                
                // Trích xuất riêng các Point (Cột) và LineString (Đường dây) để Turf phục vụ tính toán hình học
                poleFeatures = data.features.filter(f => f.geometry && (f.geometry.type === "Point" || f.geometry.type === "MultiPoint"));
                lineFeatures = data.features.filter(f => f.geometry && (f.geometry.type === "LineString" || f.geometry.type === "MultiLineString"));

                L.geoJSON(data, {
                    style: function (feature) {
                        if (feature.geometry.type === "LineString" || feature.geometry.type === "MultiLineString") {
                            return { color: "#0056b3", weight: 3, opacity: 0.8 }; 
                        } return {};
                    },
                    pointToLayer: function (feature, latlng) {
                        return L.circleMarker(latlng, { radius: 5, fillColor: "#ff8c00", color: "#ffffff", weight: 1, fillOpacity: 0.9 });
                    },
                    onEachFeature: function (feature, layer) {
                        if (feature.properties) {
                            let popupContent = "<div class='popup-custom'><b>Thông Tin Thiết Bị</b><hr style='margin:5px 0'>";
                            for (const key in feature.properties) {
                                if(feature.properties[key] !== null) popupContent += `<b>${key}:</b> ${feature.properties[key]}<br>`;
                            }
                            popupContent += "</div>";
                            layer.bindPopup(popupContent);
                        }
                    }
                }).addTo(luoiDienLayer);
            } catch (error) { console.error("Lỗi tải lưới điện:", error); }
        }

        let lightningDatabase = {}; 

        async function fetchLightningData() {
            const statusLabel = document.getElementById('loading-status');
            try {
                const response = await fetch(`./database_set.json?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error("Chưa có Database");
                
                lightningDatabase = await response.json();
                filterLightning();
                
                statusLabel.innerText = "Hoạt động tốt";
                statusLabel.style.color = "green";
            } catch (error) {
                console.log(error);
                statusLabel.innerText = "Chờ đồng bộ sét...";
                statusLabel.style.color = "gray";
            }
        }

        // ==========================================
        // XỬ LÝ LỌC SÉT VÀ TÍNH TOÁN KHOẢNG CÁCH KHÔNG GIAN
        // ==========================================
        function filterLightning() {
            lightningLayer.clearLayers();
            
            const filterSeconds = parseInt(document.getElementById('time-filter').value);
            const currentSeconds = Date.now() / 1000;
            const threshold = currentSeconds - filterSeconds;

            let count = 0;
            let insidePolygonData = []; // Mảng chứa kết quả phân tích phục vụ lập bảng báo cáo

            for (const key in lightningDatabase) {
                const record = lightningDatabase[key];
                const infoArray = record.info; 
                const timestamp = record.timestamp;

                if (timestamp >= threshold) {
                    for(let i = 0; i < infoArray.length; i++) {
                        const strikeStr = infoArray[i];
                        if(!strikeStr) continue;
                        
                        const parts = strikeStr.split(',');
                        if(parts.length < 2) continue;
                        
                        const coordsStr = parts.pop().trim();
                        const address = parts.join(', ').trim();
                        const coordParts = coordsStr.split('-');
                        if(coordParts.length !== 2) continue;
                        
                        const lat = parseFloat(coordParts[0]);
                        const lng = parseFloat(coordParts[1]);

                        if (!isNaN(lat) && !isNaN(lng)) {
                            const pt = turf.point([lng, lat]); // Điểm sét đánh hiện tại
                            let isInside = true;

                            // Bộ lọc vùng khoanh
                            if (activePolygonGeoJSON) {
                                if (!turf.booleanPointInPolygon(pt, activePolygonGeoJSON)) {
                                    isInside = false; 
                                }
                            }

                            if (!isInside) continue; // Nếu nằm ngoài vùng khoanh thì bỏ qua luôn

                            const dateObj = new Date(timestamp * 1000);
                            const timeString = dateObj.toLocaleTimeString('vi-VN') + " - " + dateObj.toLocaleDateString('vi-VN');

                            // --------------------------------------------------
                            // TOÁN HỌC KHÔNG GIAN: TÍNH TOÁN KHOẢNG CÁCH HẠ TẦNG
                            // --------------------------------------------------
                            let nearestPoleName = "N/A";
                            let distSetToCot = "N/A";
                            let distCotToDay = "N/A";

                            if (poleFeatures.length > 0) {
                                // 1. Tìm cột điện gần điểm sét này nhất
                                const poleCollection = turf.featureCollection(poleFeatures);
                                const nearestPoleFeature = turf.nearestPoint(pt, poleCollection);
                                
                                nearestPoleName = detectPoleName(nearestPoleFeature.properties);
                                // Tính khoảng cách từ Sét đến Cột (đơn vị mét)
                                const dS2C = turf.distance(pt, nearestPoleFeature, {units: 'meters'});
                                distSetToCot = `${dS2C.toFixed(1)} m`;

                                // 2. Từ vị trí cột vừa tìm được, tìm khoảng cách đến đường dây điện gần nó nhất
                                if (lineFeatures.length > 0) {
                                    let minLineDist = Infinity;
                                    lineFeatures.forEach(line => {
                                        const dC2D = turf.pointToLineDistance(nearestPoleFeature, line, {units: 'meters'});
                                        if (dC2D < minLineDist) {
                                            minLineDist = dC2D;
                                        }
                                    });
                                    if (minLineDist !== Infinity) {
                                        distCotToDay = `${minLineDist.toFixed(1)} m`;
                                    }
                                }
                            }

                            // Lưu thông tin phục vụ lập bảng hiển thị của vùng khoanh
                            insidePolygonData.push({
                                address: address,
                                poleName: nearestPoleName,
                                distSetToCot: distSetToCot,
                                distCotToDay: distCotToDay
                            });

                            // Nội dung hiển thị bóng bóng khi xem lẻ từng điểm sét
                            const popupHTML = `
                                <div style="font-family: Arial; font-size: 13px; width: 240px; line-height: 1.5;">
                                    <b style="color:red; font-size:14px;">⚡ ĐIỂM SÉT ĐÁNH</b><hr style="margin:5px 0;">
                                    <b>Khu vực:</b> ${address}<br>
                                    <b>Tọa độ:</b> ${lat.toFixed(4)}, ${lng.toFixed(4)}<br>
                                    <b>Thời gian:</b> <span style="color:blue; font-weight:bold;">${timeString}</span><br>
                                    <span style="color:#e65100;"><b>Cột gần nhất:</b> ${nearestPoleName} (${distSetToCot})</span><br>
                                    <span style="color:#1b5e20;"><b>Hành lang Cột - Dây:</b> ${distCotToDay}</span>
                                </div>
                            `;

                            const marker = L.marker([lat, lng], { icon: lightningIconRed })
                                            .bindPopup(popupHTML)
                                            .bindTooltip(popupHTML, { direction: 'top', offset: [0, -15], opacity: 0.95 });
                            
                            lightningLayer.addLayer(marker);
                            count++;
                        }
                    }
                }
            }
            
            // Cập nhật bộ đếm lên bảng thông tin
            document.getElementById('lightning-count').innerText = count;

            // --------------------------------------------------
            // VẼ BẢNG THỐNG KÊ CHI TIẾT LÊN VÙNG KHOANH KHI VẼ XONG
            // --------------------------------------------------
            if (activePolygonLayer) {
                let tableRowsHtml = "";
                insidePolygonData.forEach((item, index) => {
                    tableRowsHtml += `
                        <tr style="border-bottom: 1px solid #e0e0e0;">
                            <td style="padding: 6px; text-align: center;">${index + 1}</td>
                            <td style="padding: 6px; max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${item.address}">${item.address}</td>
                            <td style="padding: 6px; font-weight: bold; color: #0056b3; text-align: center;">${item.poleName}</td>
                            <td style="padding: 6px; color: #d32f2f; font-weight: bold; text-align: center;">${item.distSetToCot}</td>
                            <td style="padding: 6px; color: #2e7d32; font-weight: bold; text-align: center;">${item.distCotToDay}</td>
                        </tr>
                    `;
                });

                if (insidePolygonData.length === 0) {
                    tableRowsHtml = `<tr><td colspan="5" style="text-align:center; padding:15px; color:#777;">Không tìm thấy điểm sét nào trong khu vực này.</td></tr>`;
                }

                const reportContent = `
                    <div style="font-family: Arial; font-size: 12px; width: 440px;">
                        <h4 style="margin: 0 0 6px 0; color: #d9534f; text-align: center; border-bottom: 2px solid #d9534f; padding-bottom: 4px;">BẢNG PHÂN TÍCH KHÔNG GIAN HẠ TẦNG LƯỚI ĐIỆN</h4>
                        <p style="margin: 4px 0 8px 0;">Tổng số điểm sét oanh tạc vùng hành lang: <b style="font-size:14px; color:red;">${insidePolygonData.length}</b></p>
                        <div style="max-height: 190px; overflow-y: auto; border: 1px solid #ccc; border-radius: 4px;">
                            <table style="width: 100%; border-collapse: collapse; font-size: 11px;">
                                <thead style="background: #f5f5f5; position: sticky; top: 0; box-shadow: 0 1px 0 #ccc; z-index: 10;">
                                    <tr>
                                        <th style="padding: 6px; border-bottom: 1px solid #ccc;">STT</th>
                                        <th style="padding: 6px; border-bottom: 1px solid #ccc; text-align: left;">Vị trí sét</th>
                                        <th style="padding: 6px; border-bottom: 1px solid #ccc;">Cột gần nhất</th>
                                        <th style="padding: 6px; border-bottom: 1px solid #ccc;">Sét → Cột</th>
                                        <th style="padding: 6px; border-bottom: 1px solid #ccc;">Cột → Dây</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${tableRowsHtml}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                // Gắn bảng báo cáo phân tích vào popup của khung hình vẽ
                activePolygonLayer.bindPopup(reportContent, { maxWidth: 460 }).openPopup();
            }
        }

        loadLuoiDien();
        fetchLightningData();
        setInterval(fetchLightningData, 180000);
    </script>
</body>
</html>
