<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản Đồ Cảnh Báo Sét & Lưới Điện</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #map { width: 100%; height: 100vh; }
        .info-panel {
            position: absolute; top: 15px; left: 50px; /* Đổi sang góc trái để nhường chỗ cho Menu Layer bên phải */
            background: rgba(255, 255, 255, 0.95); padding: 15px;
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000; width: 260px;
        }
        .info-panel h3 { margin-top: 0; color: #333; border-bottom: 2px solid #eee; padding-bottom: 8px; }
        .status { font-weight: bold; }
        .popup-custom { max-height: 200px; overflow-y: auto; font-size: 13px; }
        .popup-custom b { color: #0056b3; }
    </style>
</head>
<body>

    <div class="info-panel">
        <h3>Cảnh Báo Giông Sét</h3>
        <p>Trạng thái: <span id="loading-status" class="status" style="color: orange;">Đang tải...</span></p>
        <p>Số điểm sét: <span id="lightning-count" style="font-weight: bold; color: #d9534f;">0</span></p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Khởi tạo bản đồ, focus thẳng vào khu vực Văn Bàn - Lào Cai
        const map = L.map('map').setView([22.0500, 104.2000], 11);

        // Lớp bản đồ nền
        const basemap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 2. Tạo 2 Layer Group riêng biệt để quản lý bật/tắt
        const lightningLayer = L.layerGroup().addTo(map);
        const luoiDienLayer = L.layerGroup().addTo(map);

        // 3. Thêm Menu điều khiển Layer ở góc phải
        const overlayMaps = {
            "⚡ Cảnh báo Sét đánh": lightningLayer,
            "🔌 Hạ tầng Lưới điện": luoiDienLayer
        };
        L.control.layers(null, overlayMaps, {collapsed: false}).addTo(map);

        // ==========================================
        // PHẦN 1: ĐỌC VÀ VẼ LƯỚI ĐIỆN TỪ JSON
        // ==========================================
        async function loadLuoiDien() {
            try {
                // Thêm timestamp để ép trình duyệt luôn lấy file mới nhất (tránh lưu cache)
                const response = await fetch(`./luoidien.json?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error("Chưa tải được file lưới điện");
                
                const data = await response.json();
                
                // Vẽ lưới điện bằng L.geoJSON
                const geoJsonLayer = L.geoJSON(data, {
                    // Tùy biến màu sắc và hình dáng
                    style: function (feature) {
                        // Nếu là đường dây (LineString) -> Vẽ nét liền màu xanh dương
                        if (feature.geometry.type === "LineString" || feature.geometry.type === "MultiLineString") {
                            return { color: "#0056b3", weight: 3, opacity: 0.8 }; 
                        }
                        return {};
                    },
                    pointToLayer: function (feature, latlng) {
                        // Nếu là điểm (Cột điện, Trạm) -> Vẽ chấm tròn màu cam
                        return L.circleMarker(latlng, {
                            radius: 5, fillColor: "#ff8c00", color: "#ffffff", weight: 1, fillOpacity: 0.9
                        });
                    },
                    onEachFeature: function (feature, layer) {
                        // Tự động quét và hiển thị toàn bộ thuộc tính PMIS khi click vào
                        if (feature.properties) {
                            let popupContent = "<div class='popup-custom'><b>Thông Tin Thiết Bị</b><hr style='margin:5px 0'>";
                            for (const key in feature.properties) {
                                if(feature.properties[key] !== null) {
                                    popupContent += `<b>${key}:</b> ${feature.properties[key]}<br>`;
                                }
                            }
                            popupContent += "</div>";
                            layer.bindPopup(popupContent);
                        }
                    }
                }).addTo(luoiDienLayer);

                // Tự động zoom bản đồ vừa khít với toàn bộ mạng lưới điện
                map.fitBounds(geoJsonLayer.getBounds());

            } catch (error) {
                console.error("Lỗi:", error);
            }
        }

        // ==========================================
        // PHẦN 2: ĐỌC VÀ VẼ ĐIỂM SÉT (Giữ nguyên logic)
        // ==========================================
        async function fetchLightningData() {
            const statusLabel = document.getElementById('loading-status');
            try {
                const response = await fetch(`./duongset.json?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error("File sét chưa có dữ liệu");
                
                const data = await response.json();
                lightningLayer.clearLayers();
                let count = 0;

                for (const key in data) {
                    if (data.hasOwnProperty(key)) {
                        const info = data[key];
                        const lat = parseFloat(info[1]);
                        const lng = parseFloat(info[2]);

                        if (!isNaN(lat) && !isNaN(lng)) {
                            const marker = L.circleMarker([lat, lng], {
                                radius: 6, fillColor: "#ff1a1a", color: "#ffffff", weight: 1, fillOpacity: 0.85
                            }).bindPopup(`<b>⚡ Vị trí:</b> ${info[0]}<br><b>Tọa độ:</b> ${lat.toFixed(4)}, ${lng.toFixed(4)}`);
                            
                            lightningLayer.addLayer(marker);
                            count++;
                        }
                    }
                }
                document.getElementById('lightning-count').innerText = count;
                statusLabel.innerText = "Hoạt động tốt";
                statusLabel.style.color = "green";
            } catch (error) {
                statusLabel.innerText = "Chờ dữ liệu sét...";
                statusLabel.style.color = "gray";
            }
        }

        // Khởi động chạy cả 2 hàm
        loadLuoiDien();
        fetchLightningData();
        
        // Cập nhật điểm sét mỗi 3 phút
        setInterval(fetchLightningData, 180000);
    </script>
</body>
</html>
