name: Tự động cập nhật dữ liệu Sét và Lưới điện

on:
  push: # Tự động chạy ngay lập tức khi bạn up file zip hoặc sửa code
  schedule:
    - cron: '*/10 * * * *' # Lên lịch chạy ngầm tự động mỗi 10 phút để quét sét
  workflow_dispatch: # Nút bấm chạy thủ công nếu muốn

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Lấy mã nguồn về máy ảo
        uses: actions/checkout@v3

      - name: Cài đặt Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Đặt bản 3.10 ổn định cho các thư viện GIS

      - name: Cài đặt các thư viện yêu cầu (Sét & Bản đồ)
        run: |
          pip install requests geopandas pandas shapely fiona pyproj

      - name: ⚡ Chạy script cào dữ liệu Sét
        run: python crawl.py

      - name: 🔌 Chạy script chuyển đổi tự động các file .zip hạ tầng sang .json
        run: python convert_zip.py

      - name: 💾 Lưu vĩnh viễn và đẩy tất cả dữ liệu lên GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Lệnh quan trọng: Gom cả dữ liệu sét và TẤT CẢ các file .json lưới điện mới đẻ ra
          git add duongset.json database_set.json *.json
          
          git commit -m "Auto-update dữ liệu sét và đồng bộ hạ tầng lưới điện các Điện lực" || exit 0
          git pull --rebase
          git push
